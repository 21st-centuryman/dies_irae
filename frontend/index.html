<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/style.css">
  <title>Dies Irae</title>
</head>
<body>

  <!-- Three.js background canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Your actual site content -->
  <div class="site-content">
    <nav class="header">
      <span class="logo">Dies Irae</span>
      <a id="openScenario" style="cursor:pointer;">Senario</a>
      <a id="openMap" style="cursor:pointer;">Map</a>
    </nav>

    <div class="table" id="scenarioTable">
        <button class="close" id="closeScenario">✕</button>
        <h4>Select Scenario</h4>
        <div class="server">
          <input id="serverInput" type="text" maxlength="32" placeholder="server name" />
          <input id="serverPort" type="number" min="0" max="65535" step="1" placeholder="server port" />
        </div>
        <select id="scenarioDropdown">
          <option Value="Dummy Value">Dummy Value</option>
        </select>
        <button class="confirmBtn" id="sendScenario">Start Scenario</button>
        <h6>Status</h6>
    </div>

    <div class="table" id="mapTable">
        <button class="close" id="closeMap">✕</button>
        <h4>Select Cordinate</h4> 
        <input id="coordInput" type="text" placeholder="lat, lng" />
        <div id="sweden-map-wrapper">
          <div id="sweden-map"></div>
        </div>
        <input type="hidden" id="lat" />
        <input type="hidden" id="lon" />
        <button class="confirmBtn" id="expandMap">Expand Map</button>
        <button class="confirmBtn" id="sendMap">Select Cordinate</button>
        <h6 id="terrainStatus"></h6>
    </div>

  </div>


<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/3d.js"></script>
</body>
</html>
